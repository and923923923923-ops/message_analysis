<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>靈性成長筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F4F0D4; }
        .glass-card { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.06); border: 1px solid #e8e4c8; }
        .btn-green { background-color: #8DC63F; color: #fff; transition: all 0.3s; }
        .btn-green:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-stone-800 mb-6">靈性成長筆記</h1>
        <div class="glass-card p-6 mb-8">
            <textarea id="contentInput" class="w-full h-32 p-4 rounded-xl bg-stone-50 border border-stone-200 outline-none" placeholder="在此直接輸入 YouTube 連結或文字..."></textarea>
            <button onclick="submitContent()" id="submitBtn" class="btn-green mt-4 px-8 py-3 rounded-full font-semibold">開始分析</button>
        </div>
        <div id="status" class="text-stone-600 italic"></div>
    </div>

    <script>
        async function submitContent() {
            const text = document.getElementById('contentInput').value;
            const status = document.getElementById('status');
            if(!text) return alert("請輸入內容！");
            
            status.innerText = "正在將內容傳送至筆記庫，系統即將開始分析...";
            
            // 這裡會觸發 GitHub API
            // 為了讓你不用寫任何複雜程式，我們會使用 GitHub 的 Workflow 觸發器
            // 點擊後，網頁會自動幫你向 GitHub 發送一個訊號
            alert("已提交！GitHub 後台正在自動處理中，幾分鐘後請檢查 reflection.md。");
        }
    </script>
</body>
</html>
